# fly.toml - Fly.io configuration for faf_cn

app = 'faf-cn'
primary_region = 'sin'

[build]

[deploy]
  release_command = '/app/bin/migrate_and_seed'

[env]
  PHX_HOST = 'faf-cn.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
